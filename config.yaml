# Smart Investment Bot Configuration

# Trading Settings
trading:
  daily_profit_target: 0.01  # 1% daily profit target
  max_daily_loss: 0.02       # 2% maximum daily loss
  initial_capital: 10000     # Starting capital in USD
  position_size_percent: 0.1 # Maximum 10% of portfolio per position
  
# Risk Management
risk:
  stop_loss_percent: 0.02    # 2% stop loss
  take_profit_percent: 0.03  # 3% take profit
  max_positions: 5           # Maximum simultaneous positions
  drawdown_limit: 0.05       # 5% maximum drawdown

# API Keys (use environment variables)
apis:
  binance:
    api_key: ${BINANCE_API_KEY}
    secret_key: ${BINANCE_SECRET_KEY}
    sandbox: true              # Use sandbox for testing
  
  alpha_vantage:
    api_key: ${ALPHA_VANTAGE_API_KEY}
  
  yahoo_finance:
    enabled: true              # No API key needed
  
  interactive_brokers:
    host: "127.0.0.1"
    port: 7497
    client_id: 1
  
  coingecko:
    api_key: ${COINGECKO_API_KEY}

# Database Configuration
database:
  type: "sqlite"
  url: "sqlite:///smart_bot.db"
  # For PostgreSQL: "postgresql://user:password@localhost/smart_bot"

# Supported Assets
assets:
  cryptocurrencies:
    - BTC/USDT
    - ETH/USDT
    - BNB/USDT
    - ADA/USDT
  
  stocks:
    - AAPL    # Apple
    - GOOGL   # Google
    - MSFT    # Microsoft
    - TSLA    # Tesla
  
  commodities:
    - GC=F    # Gold futures
    - CL=F    # Crude oil futures
    - SI=F    # Silver futures
  
  forex:
    - EUR/USD
    - GBP/USD
    - USD/JPY

# Trading Strategies
strategies:
  default: "scalping"
  enabled:
    - scalping
    - swing
  
  scalping:
    timeframes: ["1m", "5m"]
    indicators: ["RSI", "MACD"]
    
  swing:
    timeframes: ["1h", "4h", "1d"]
    indicators: ["Bollinger_Bands", "Moving_Averages"]

# Technical Analysis
technical_analysis:
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  
  bollinger_bands:
    period: 20
    std_dev: 2

# Notifications
notifications:
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
  
  discord:
    enabled: false
    webhook_url: ${DISCORD_WEBHOOK_URL}

# Logging
logging:
  level: "INFO"
  file: "logs/smart_bot.log"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"

# Scheduling
schedule:
  trading_hours:
    start: "09:00"
    end: "16:00"
    timezone: "UTC"
  
  market_scan_interval: 300   # 5 minutes
  portfolio_check_interval: 60 # 1 minute